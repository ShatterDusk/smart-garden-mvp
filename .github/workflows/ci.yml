name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

# 并发控制：同一分支的多个 workflow 只保留最新的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 环境变量（可在整个 workflow 中使用）
env:
  NODE_VERSION: '20'
  BACKEND_DIR: ./backend/server
  # 测试环境变量
  JWT_SECRET: test-jwt-secret-for-ci
  COS_BUCKET: test-bucket
  COS_REGION: ap-shanghai
  WECHAT_ENV_ID: test-env
  WECHAT_APPID: test-appid
  WECHAT_SECRET: test-secret

jobs:
  # ========== Stage 1: 后端代码检查 ==========
  backend-lint:
    runs-on: ubuntu-latest
    name: Backend Lint

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
    
    - name: 安装依赖
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm ci
    
    - name: ESLint 检查
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm run lint
      continue-on-error: true
    
    - name: Prettier 检查
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm run format:check || true

  # ========== Stage 2: 后端单元测试 ==========
  backend-unit-test:
    runs-on: ubuntu-latest
    name: Backend Unit Tests
    needs: backend-lint

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
    
    - name: 安装依赖
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm ci
    
    - name: 运行单元测试
      working-directory: ${{ env.BACKEND_DIR }}
      env:
        NODE_ENV: test
      run: npm run test:unit -- --coverage
    
    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        files: ${{ env.BACKEND_DIR }}/coverage/lcov.info
        flags: backend-unittests
        name: backend-codecov
        fail_ci_if_error: false
    
    - name: 保存覆盖率报告
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: ${{ env.BACKEND_DIR }}/coverage/
        retention-days: 7

  # ========== Stage 3: 后端集成测试 ==========
  backend-integration-test:
    runs-on: ubuntu-latest
    name: Backend Integration Tests
    needs: backend-unit-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smart_garden_test
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
    
    - name: 安装依赖
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm ci
    
    - name: 等待 MySQL 启动并配置权限
      run: |
        sudo apt-get install -y mysql-client
        for i in {1..30}; do
          if mysqladmin ping --host=127.0.0.1 --password=root --silent; then
            echo "✅ MySQL 已启动"
            break
          fi
          echo "等待 MySQL 启动... ($i/30)"
          sleep 1
        done
        
        # 配置 root 用户允许从任何主机连接
        mysql --host=127.0.0.1 --user=root --password=root -e "
          ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';
          FLUSH PRIVILEGES;
        " || echo "用户权限配置可能已存在"
    
    - name: 运行数据库迁移（如有）
      working-directory: ${{ env.BACKEND_DIR }}
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: smart_garden_test
        DB_USER: root
        DB_PASSWORD: root
      run: |
        # 如果有迁移脚本，在这里运行
        # npx sequelize-cli db:migrate
        echo "数据库准备完成"
    
    - name: 运行集成测试
      working-directory: ${{ env.BACKEND_DIR }}
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: smart_garden_test
        DB_USER: root
        DB_PASSWORD: root
        JWT_SECRET: test-jwt-secret-for-ci
        COS_BUCKET: test-bucket
        COS_REGION: ap-shanghai
        WECHAT_ENV_ID: test-env
        WECHAT_APPID: test-appid
        WECHAT_SECRET: test-secret
      run: |
        echo "=== 环境变量检查 ==="
        echo "DB_HOST: $DB_HOST"
        echo "DB_PORT: $DB_PORT"
        echo "DB_NAME: $DB_NAME"
        echo "DB_USER: $DB_USER"
        echo "NODE_ENV: $NODE_ENV"
        echo "==================="
        npm run test:integration

  # ========== Stage 4: 后端构建检查 ==========
  backend-build:
    runs-on: ubuntu-latest
    name: Backend Build
    needs: [backend-unit-test, backend-integration-test]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
    
    - name: 安装依赖
      working-directory: ${{ env.BACKEND_DIR }}
      run: npm ci
    
    - name: 检查应用能否加载
      working-directory: ${{ env.BACKEND_DIR }}
      env:
        NODE_ENV: production
        DB_HOST: localhost
        DB_NAME: test_db
        DB_USER: test
        DB_PASSWORD: test
        JWT_SECRET: test-secret
      run: |
        node -e "require('./src/app.js'); console.log('✅ 后端应用加载成功')"
      continue-on-error: true

  # ========== Stage 5: 微信小程序构建（可选） ==========
  # frontend-build:
  #   runs-on: ubuntu-latest
  #   name: Frontend Build
  #   needs: backend-unit-test
  #
  #   steps:
  #   - name: 检出代码
  #     uses: actions/checkout@v4
  #   
  #   - name: 设置 Node.js
  #     uses: actions/setup-node@v4
  #     with:
  #       node-version: ${{ env.NODE_VERSION }}
  #   
  #   - name: 安装小程序依赖
  #     working-directory: ./frontend
  #     run: |
  #       # 微信小程序通常不需要 npm install
  #       # 这里可以放置其他前端检查
  #       echo "前端检查完成"

  # ========== Stage 6: 测试总结 ==========
  test-summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [backend-lint, backend-unit-test, backend-integration-test, backend-build]
    if: always()

    steps:
    - name: 测试结果总结
      run: |
        echo "=========================================="
        echo "         🧪 CI 测试执行总结 🧪            "
        echo "=========================================="
        echo ""
        echo "后端检查:     ${{ needs.backend-lint.result }}"
        echo "单元测试:     ${{ needs.backend-unit-test.result }}"
        echo "集成测试:     ${{ needs.backend-integration-test.result }}"
        echo "构建检查:     ${{ needs.backend-build.result }}"
        echo ""
        echo "=========================================="
        
        # 检查是否有失败
        if [[ "${{ needs.backend-lint.result }}" == "failure" ]] || \
           [[ "${{ needs.backend-unit-test.result }}" == "failure" ]] || \
           [[ "${{ needs.backend-integration-test.result }}" == "failure" ]]; then
          echo "❌ 测试未通过，请修复问题后再合并"
          exit 1
        else
          echo "✅ 所有测试通过！"
        fi

  # ========== Stage 7: 构建 Docker 镜像 ==========
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [test-summary]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 登录到镜像仓库
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 构建并推送镜像
      uses: docker/build-push-action@v5
      with:
        context: ./backend/server
        push: true
        tags: |
          ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ secrets.DOCKER_IMAGE_NAME || 'proj-alpha-backend' }}:latest
          ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ secrets.DOCKER_IMAGE_NAME || 'proj-alpha-backend' }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ========== Stage 8: 自动部署到生产环境 ==========
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build-docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 SSH 密钥
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: 部署到服务器
      id: deploy
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/proj-alpha' }}
        DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
        DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME || 'proj-alpha-backend' }}
        GITHUB_SHA: ${{ github.sha }}
      run: |
        echo "🚀 开始部署到生产环境..."
        echo "部署主机: $DEPLOY_HOST"
        echo "部署路径: $DEPLOY_PATH"

        # 添加服务器到 known_hosts
        mkdir -p ~/.ssh
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

        # 在服务器上执行部署
        ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
          set -e
          echo "📦 拉取最新镜像..."
          cd $DEPLOY_PATH

          # 拉取新镜像
          docker pull $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$GITHUB_SHA
          docker tag $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$GITHUB_SHA $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:latest

          echo "🔄 重启服务..."
          # 使用 docker-compose 或 docker stack 部署
          if [ -f "docker-compose.yml" ]; then
            docker-compose down
            docker-compose up -d
          elif [ -f "docker-compose.prod.yml" ]; then
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
          else
            # 直接运行容器
            docker stop proj-alpha-backend || true
            docker rm proj-alpha-backend || true
            docker run -d \
              --name proj-alpha-backend \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file .env \
              -v /opt/proj-alpha/uploads:/tmp/uploads \
              $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:latest
          fi

          echo "🧹 清理旧镜像..."
          docker image prune -f

          echo "✅ 部署完成！"
          docker ps | grep proj-alpha-backend || true
        EOF

        echo "url=http://$DEPLOY_HOST:3000" >> $GITHUB_OUTPUT
        echo "✅ 部署成功！"

    - name: 部署通知
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 后端自动部署成功！"
          echo "提交: ${{ github.sha }}"
          echo "作者: ${{ github.actor }}"
          echo "消息: ${{ github.event.head_commit.message }}"
        else
          echo "❌ 部署失败，请检查日志"
        fi
