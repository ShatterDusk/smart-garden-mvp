name: Redis 缓存改造 - 回滚

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '回滚环境'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      target:
        description: '回滚目标'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - stable
          - time
      timestamp:
        description: '回滚时间点 (仅 time 模式需要)'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  rollback:
    runs-on: ubuntu-latest
    name: 执行回滚

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确认回滚操作
        run: |
          echo "⚠️ 即将执行回滚操作"
          echo "环境: ${{ github.event.inputs.environment }}"
          echo "回滚目标: ${{ github.event.inputs.target }}"
          
          if [ "${{ github.event.inputs.target }}" == "time" ]; then
            echo "回滚时间点: ${{ github.event.inputs.timestamp }}"
          fi
          
          echo ""
          echo "如需取消，请在 10 秒内取消工作流..."
          sleep 10

      - name: 执行回滚
        run: |
          echo "🔄 执行回滚..."
          
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" == "time" ]; then
            TARGET="time:${{ github.event.inputs.timestamp }}"
          fi
          
          bash workspace-20260414-redis-cache/scripts/rollback.sh \
            ${{ github.event.inputs.environment }} \
            $TARGET

      - name: 验证回滚
        run: |
          echo "✅ 验证回滚结果..."
          
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          bash workspace-20260414-redis-cache/scripts/health-check.sh $ENVIRONMENT

      - name: 发送通知
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 回滚成功"
          else
            echo "❌ 回滚失败，请手动处理"
            exit 1
          fi
