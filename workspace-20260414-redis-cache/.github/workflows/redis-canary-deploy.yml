name: Redis 缓存改造 - 灰度发布

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '发布环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      canary_percentage:
        description: '灰度比例 (%)'
        required: true
        default: '10'
        type: choice
        options:
          - '10'
          - '25'
          - '50'
          - '100'
      use_redis:
        description: '启用 Redis 缓存'
        required: true
        default: true
        type: boolean

env:
  NODE_VERSION: '20'
  BACKEND_DIR: ./backend/server

jobs:
  # ========== Stage 1: 预检 ==========
  precheck:
    runs-on: ubuntu-latest
    name: 发布前检查

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查工作区文件完整性
        run: |
          echo "🔍 检查工作区文件..."

          required_files=(
            "workspace-20260414-redis-cache/src/CacheService.js"
            "workspace-20260414-redis-cache/src/weatherService-with-redis.js"
            "workspace-20260414-redis-cache/docker/Dockerfile"
            "workspace-20260414-redis-cache/checklist.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ 缺少必需文件: $file"
              exit 1
            fi
            echo "✅ $file"
          done

      - name: 验证文件语法
        run: |
          echo "🔍 验证 JavaScript 语法..."
          node --check workspace-20260414-redis-cache/src/CacheService.js && echo "✅ CacheService.js 语法正确"
          node --check workspace-20260414-redis-cache/src/weatherService-with-redis.js && echo "✅ weatherService-with-redis.js 语法正确"

      - name: 输出发布配置
        run: |
          echo "📋 发布配置"
          echo "环境: ${{ github.event.inputs.environment }}"
          echo "灰度比例: ${{ github.event.inputs.canary_percentage }}%"
          echo "启用 Redis: ${{ github.event.inputs.use_redis }}"

  # ========== Stage 2: 测试 ==========
  test:
    runs-on: ubuntu-latest
    name: 运行测试
    needs: precheck

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smart_garden_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json

      - name: 安装依赖
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          npm ci
          npm install ioredis --save

      - name: 复制 Redis 改造文件
        run: |
          echo "📋 复制 CacheService.js..."
          cp workspace-20260414-redis-cache/src/CacheService.js backend/server/src/services/

          echo "📋 备份并替换 weatherService.js..."
          cp backend/server/src/services/weatherService.js backend/server/src/services/weatherService.js.backup
          cp workspace-20260414-redis-cache/src/weatherService-with-redis.js backend/server/src/services/weatherService.js

          echo "✅ 文件复制完成"

      - name: 运行 CacheService 单元测试
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "🧪 运行 CacheService 测试..."
          cp ../../workspace-20260414-redis-cache/tests/CacheService.test.js tests/unit/services/
          npm run test:unit -- --testPathPattern=CacheService --coverage

      - name: 测试 Redis 连接和降级
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "🧪 测试 Redis 连接..."
          node -e "
            const cacheService = require('./src/services/CacheService');

            async function test() {
              // 测试 Redis 模式
              await cacheService.init();
              console.log('状态:', JSON.stringify(cacheService.getStatus()));

              // 测试基本操作
              await cacheService.set('test:key', { data: 'value' }, 60000);
              const value = await cacheService.get('test:key');
              console.log('缓存读写:', value ? '✅ 成功' : '❌ 失败');

              // 测试降级
              await cacheService.close();
              process.env.REDIS_HOST = 'invalid-host';
              await cacheService.init();
              console.log('降级后状态:', JSON.stringify(cacheService.getStatus()));

              await cacheService.close();
              console.log('✅ 所有测试通过');
            }

            test().catch(err => { console.error('❌ 测试失败:', err.message); process.exit(1); });
          "

  # ========== Stage 3: 构建 ==========
  build:
    runs-on: ubuntu-latest
    name: 构建应用
    needs: test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          npm ci
          npm install ioredis --save

      - name: 复制改造文件
        run: |
          cp workspace-20260414-redis-cache/src/CacheService.js backend/server/src/services/
          cp workspace-20260414-redis-cache/src/weatherService-with-redis.js backend/server/src/services/weatherService.js

      - name: 构建 Docker 镜像
        run: |
          echo "🐳 构建应用镜像..."
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            -t plantgpt-backend:${{ github.sha }} \
            -f ${{ env.BACKEND_DIR }}/Dockerfile \
            ${{ env.BACKEND_DIR }}

          docker tag plantgpt-backend:${{ github.sha }} plantgpt-backend:latest

          echo "✅ 镜像构建完成"

      - name: 保存镜像到 artifact
        run: |
          echo "� 保存镜像..."
          docker save plantgpt-backend:${{ github.sha }} -o plantgpt-backend.tar
          ls -lh plantgpt-backend.tar

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            plantgpt-backend.tar
            workspace-20260414-redis-cache/src/
            workspace-20260414-redis-cache/docker/
            workspace-20260414-redis-cache/checklist.md
          retention-days: 7

  # ========== Stage 4: 灰度部署 ==========
  deploy-staging:
    runs-on: ubuntu-latest
    name: 部署到测试环境
    needs: build
    if: github.event.inputs.environment == 'staging'

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}

      - name: 部署到测试环境
        run: |
          echo "🚀 部署到测试环境..."

          # 配置环境变量
          cat > .env << EOF
          NODE_ENV=production
          REDIS_HOST=${{ secrets.STAGING_REDIS_HOST }}
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          REDIS_KEY_PREFIX=plantgpt:weather:
          USE_REDIS=${{ github.event.inputs.use_redis }}
          EOF

          echo "📋 环境变量配置:"
          grep -v PASSWORD .env || true

          # 执行部署脚本
          chmod +x ../workspace-20260414-redis-cache/scripts/deploy.sh
          bash ../workspace-20260414-redis-cache/scripts/deploy.sh staging

  # ========== Stage 5: 生产部署 ==========
  deploy-production:
    runs-on: ubuntu-latest
    name: 部署到生产环境
    needs: build
    if: github.event.inputs.environment == 'production'

    environment:
      name: production
      url: https://api.example.com

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}

      - name: 部署到生产环境
        run: |
          echo "🚀 部署到生产环境..."

          # 配置环境变量
          cat > .env << EOF
          NODE_ENV=production
          REDIS_HOST=${{ secrets.PROD_REDIS_HOST }}
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
          REDIS_KEY_PREFIX=plantgpt:weather:
          USE_REDIS=${{ github.event.inputs.use_redis }}
          CANARY_PERCENTAGE=${{ github.event.inputs.canary_percentage }}
          EOF

          echo "📋 部署配置:"
          echo "- 灰度比例: ${{ github.event.inputs.canary_percentage }}%"
          echo "- 启用 Redis: ${{ github.event.inputs.use_redis }}"

          # 执行灰度部署
          chmod +x ../workspace-20260414-redis-cache/scripts/canary-deploy.sh
          bash ../workspace-20260414-redis-cache/scripts/canary-deploy.sh production ${{ github.event.inputs.canary_percentage }}

  # ========== Stage 6: 健康检查 ==========
  health-check:
    runs-on: ubuntu-latest
    name: 健康检查
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: 执行健康检查
        run: |
          echo "🏥 执行健康检查..."

          ENVIRONMENT="${{ needs.deploy-staging.result != 'skipped' && 'staging' || 'production' }}"
          echo "检查环境: $ENVIRONMENT"

          # 调用健康检查脚本
          bash ../workspace-20260414-redis-cache/scripts/health-check.sh $ENVIRONMENT || {
            echo "❌ 健康检查失败"
            exit 1
          }

          echo "✅ 健康检查通过"

  # ========== Stage 7: 监控指标 ==========
  monitor:
    runs-on: ubuntu-latest
    name: 监控指标
    needs: health-check
    if: github.event.inputs.environment == 'production'

    steps:
      - name: 收集监控数据
        run: |
          echo "📊 收集监控指标..."
          echo "等待 5 分钟让缓存预热..."
          sleep 300

          # 模拟收集指标
          echo "缓存命中率: 85%"
          echo "响应时间: 45ms"
          echo "Redis 内存使用: 65%"

      - name: 发送通知
        if: always()
        run: |
          if [ "${{ needs.health-check.result }}" == "success" ]; then
            echo "✅ 灰度发布成功！"
            # 可以在这里添加钉钉/飞书/Slack 通知
          else
            echo "❌ 灰度发布存在问题，请检查！"
            exit 1
          fi

  # ========== Stage 8: 回滚触发器 ==========
  rollback-ready:
    runs-on: ubuntu-latest
    name: 回滚就绪
    needs: [monitor, health-check]
    if: always() && github.event.inputs.environment == 'production'

    steps:
      - name: 输出回滚信息
        run: |
          echo "📋 回滚信息"
          echo "如需回滚，执行以下命令:"
          echo ""
          echo "bash scripts/rollback.sh production ${{ github.sha }}"
          echo ""
          echo "或者点击下方链接触发回滚:"
          echo "https://github.com/${{ github.repository }}/actions/workflows/redis-rollback.yml"
