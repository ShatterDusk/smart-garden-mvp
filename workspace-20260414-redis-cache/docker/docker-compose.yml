# ============================================
# Redis 缓存改造 - Docker Compose 配置
# 用于本地开发和测试
# ============================================

version: '3.8'

services:
  # ============================================
  # 后端服务
  # ============================================
  backend:
    build:
      context: ./backend/server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=smart_garden
      - DB_USER=root
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_KEY_PREFIX=plantgpt:dev:weather:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # 挂载改造后的文件（开发时实时修改）
      - ./src/CacheService.js:/usr/src/app/src/services/CacheService.js
      - ./src/weatherService-with-redis.js:/usr/src/app/src/services/weatherService.js
    networks:
      - plantgpt-network

  # ============================================
  # MySQL 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=smart_garden
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plantgpt-network

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    build:
      context: ./docker
      dockerfile: Dockerfile
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=dev-redis-password
      - REDIS_MAXMEMORY=128mb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plantgpt-network

volumes:
  mysql-data:

networks:
  plantgpt-network:
    driver: bridge
