<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PlantGPT 首页设计预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    
    /* 手机容器 */
    .phone-container {
      max-width: 414px;
      margin: 0 auto;
      background: #f8f9fa;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    /* 状态栏 */
    .status-bar {
      height: 44px;
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }
    
    /* 头部区域 */
    .header {
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      padding: 16px 20px 24px;
      color: white;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .greeting {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .sub-greeting {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      backdrop-filter: blur(10px);
    }
    
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #FF5252;
      border-radius: 50%;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    
    /* 主内容区 */
    .main-content {
      padding: 20px 16px;
    }
    
    /* 核心功能区 */
    .core-section {
      margin-bottom: 24px;
    }
    
    /* 拍照诊断大卡片 */
    .primary-card {
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      border-radius: 20px;
      padding: 24px;
      color: white;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(76, 175, 80, 0.3);
    }
    
    .primary-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    
    .primary-card::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 150px;
      height: 150px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    
    .primary-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .primary-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .primary-desc {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }
    
    .camera-area {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }
    
    .camera-icon {
      font-size: 48px;
      opacity: 0.8;
    }
    
    /* 次要功能卡片 */
    .secondary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .secondary-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    .secondary-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    
    .secondary-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    
    .secondary-desc {
      font-size: 12px;
      color: #999;
    }
    
    /* 植物区域 */
    .section {
      margin-bottom: 24px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }
    
    .section-action {
      font-size: 14px;
      color: #4CAF50;
      font-weight: 500;
    }
    
    /* 植物卡片横向滚动 */
    .plants-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px;
      scrollbar-width: none;
    }
    
    .plants-scroll::-webkit-scrollbar {
      display: none;
    }
    
    .plant-card {
      min-width: 140px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
      position: relative;
    }
    
    .plant-emoji {
      font-size: 48px;
      margin-bottom: 8px;
    }
    
    .plant-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }
    
    .health-ring {
      width: 50px;
      height: 50px;
      margin: 0 auto;
      position: relative;
    }
    
    .health-ring svg {
      transform: rotate(-90deg);
    }
    
    .health-ring-bg {
      fill: none;
      stroke: #e8f5e9;
      stroke-width: 4;
    }
    
    .health-ring-progress {
      fill: none;
      stroke: #4CAF50;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }
    
    .health-ring-progress.warning {
      stroke: #FF9800;
    }
    
    .health-score {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 700;
      color: #4CAF50;
    }
    
    .device-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      background: #4CAF50;
      border-radius: 50%;
      box-shadow: 0 0 0 2px white;
    }
    
    .device-indicator.offline {
      background: #999;
    }
    
    /* 添加植物按钮 */
    .add-plant-card {
      min-width: 140px;
      background: #f0f7f0;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 2px dashed #4CAF50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
    }
    
    .add-icon {
      font-size: 36px;
      color: #4CAF50;
      margin-bottom: 8px;
    }
    
    .add-text {
      font-size: 14px;
      color: #4CAF50;
      font-weight: 500;
    }
    
    /* 空状态 */
    .empty-plants {
      background: white;
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .empty-desc {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* 养护小贴士 */
    .tip-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      gap: 16px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    .tip-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4CAF50, #81C784);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    
    .tip-content {
      flex: 1;
    }
    
    .tip-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .tip-text {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    
    /* 底部导航 */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 414px;
      height: 64px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 8px;
    }
    
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    .tab-icon {
      font-size: 24px;
    }
    
    .tab-text {
      font-size: 11px;
      color: #999;
    }
    
    .tab-item.active .tab-text {
      color: #4CAF50;
    }
    
    /* 切换按钮 */
    .toggle-section {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .toggle-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }
    
    .toggle-btn.active {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="phone-container">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span>📶 5G 🔋</span>
    </div>
    
    <!-- 头部 -->
    <div class="header">
      <div class="header-top">
        <div>
          <div class="greeting">早上好，小园丁 🌿</div>
          <div class="sub-greeting">今天也是充满生机的一天</div>
        </div>
        <div class="header-actions">
          <div class="action-btn">
            🔔
            <span class="badge">3</span>
          </div>
          <div class="action-btn">⚙️</div>
        </div>
      </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main-content">
      <!-- 切换演示状态 -->
      <div class="toggle-section">
        <button class="toggle-btn active" onclick="showState('with-plants')">有植物状态</button>
        <button class="toggle-btn" onclick="showState('empty')">空状态</button>
      </div>
      
      <!-- 核心功能区 -->
      <div class="core-section">
        <!-- 拍照诊断 -->
        <div class="primary-card">
          <div class="primary-icon">📸</div>
          <div class="primary-title">拍照诊断</div>
          <div class="primary-desc">拍照识别植物品种，智能诊断健康问题</div>
          <div class="camera-area">
            <span class="camera-icon">📷</span>
          </div>
        </div>
        
        <!-- 次要功能 -->
        <div class="secondary-grid">
          <div class="secondary-card">
            <div class="secondary-icon">💬</div>
            <div class="secondary-title">智能问答</div>
            <div class="secondary-desc">问问 AI</div>
          </div>
          <div class="secondary-card">
            <div class="secondary-icon">➕</div>
            <div class="secondary-title">添加植物</div>
            <div class="secondary-desc">新建档案</div>
          </div>
        </div>
      </div>
      
      <!-- 植物区域 - 有植物状态 -->
      <div id="with-plants-state" class="section">
        <div class="section-header">
          <span class="section-title">我的植物 (3)</span>
          <span class="section-action">查看全部 ></span>
        </div>
        
        <div class="plants-scroll">
          <!-- 植物卡片 1 -->
          <div class="plant-card">
            <div class="device-indicator"></div>
            <div class="plant-emoji">🌿</div>
            <div class="plant-name">绿萝</div>
            <div class="health-ring">
              <svg width="50" height="50" viewBox="0 0 50 50">
                <circle class="health-ring-bg" cx="25" cy="25" r="20"></circle>
                <circle class="health-ring-progress" cx="25" cy="25" r="20" 
                        stroke-dasharray="125.6" stroke-dashoffset="10"></circle>
              </svg>
              <span class="health-score">92</span>
            </div>
          </div>
          
          <!-- 植物卡片 2 -->
          <div class="plant-card">
            <div class="device-indicator offline"></div>
            <div class="plant-emoji">🌹</div>
            <div class="plant-name">月季</div>
            <div class="health-ring">
              <svg width="50" height="50" viewBox="0 0 50 50">
                <circle class="health-ring-bg" cx="25" cy="25" r="20"></circle>
                <circle class="health-ring-progress warning" cx="25" cy="25" r="20" 
                        stroke-dasharray="125.6" stroke-dashoffset="30"></circle>
              </svg>
              <span class="health-score" style="color: #FF9800;">76</span>
            </div>
          </div>
          
          <!-- 植物卡片 3 -->
          <div class="plant-card">
            <div class="plant-emoji">🌵</div>
            <div class="plant-name">多肉</div>
            <div class="health-ring">
              <svg width="50" height="50" viewBox="0 0 50 50">
                <circle class="health-ring-bg" cx="25" cy="25" r="20"></circle>
                <circle class="health-ring-progress" cx="25" cy="25" r="20" 
                        stroke-dasharray="125.6" stroke-dashoffset="5"></circle>
              </svg>
              <span class="health-score">96</span>
            </div>
          </div>
          
          <!-- 添加植物 -->
          <div class="add-plant-card">
            <div class="add-icon">➕</div>
            <div class="add-text">添加新植物</div>
          </div>
        </div>
      </div>
      
      <!-- 植物区域 - 空状态 -->
      <div id="empty-state" class="section" style="display: none;">
        <div class="section-header">
          <span class="section-title">我的植物</span>
        </div>
        
        <div class="empty-plants">
          <div class="empty-icon">🌱</div>
          <div class="empty-title">还没有添加植物</div>
          <div class="empty-desc">添加你的第一株植物，开启智能养护之旅</div>
          <button class="btn-primary">➕ 添加植物</button>
        </div>
      </div>
      
      <!-- 养护小贴士 -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">💡 养护小贴士</span>
          <span class="section-action">换一换</span>
        </div>
        
        <div class="tip-card">
          <div class="tip-icon">�</div>
          <div class="tip-content">
            <div class="tip-title">浇水提示</div>
            <div class="tip-text">夏季多肉植物需减少浇水频率，避免积水烂根。建议每周检查土壤湿度，干透后再浇水。</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tab-bar">
      <div class="tab-item active">
        <span class="tab-icon">🏠</span>
        <span class="tab-text">首页</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">🌿</span>
        <span class="tab-text">植物</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">📷</span>
        <span class="tab-text">诊断</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">💬</span>
        <span class="tab-text">会话</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">👤</span>
        <span class="tab-text">我的</span>
      </div>
    </div>
  </div>
  
  <script>
    function showState(state) {
      // 更新按钮状态
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // 切换显示
      if (state === 'empty') {
        document.getElementById('with-plants-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
      } else {
        document.getElementById('with-plants-state').style.display = 'block';
        document.getElementById('empty-state').style.display = 'none';
      }
    }
  </script>
</body>
</html>
